<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Config</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #edit-panel { display: none; }
    #edit-panel.active { display: block; }
  </style>
</head>
<body class="bg-slate-50">
  <!-- Header -->
  <header class="fixed top-0 left-0 right-0 h-16 bg-white shadow-md z-50 flex items-center justify-between px-6">
    <h1 class="text-xl font-semibold text-slate-800">Monitoring Config</h1>
    <button onclick="saveAll()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition">
      Save All
    </button>
  </header>

  <!-- Main Content -->
  <main class="pt-20 px-6 pb-6">
    <!-- Search -->
    <div class="mb-6 flex flex-wrap items-center gap-4">
      <input type="text" id="search" placeholder="Search by description..." 
        class="flex-1 min-w-[250px] max-w-md px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none"
        oninput="filterEntries()">
      <div id="source-filters" class="flex flex-wrap gap-2"></div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-slate-100">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Description</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Sources</th>
          </tr>
        </thead>
        <tbody id="entries-body" class="divide-y divide-slate-200">
        </tbody>
      </table>
    </div>
  </main>

  <!-- Edit Panel -->
  <div id="edit-panel" class="fixed top-0 right-0 h-full w-[400px] bg-white shadow-2xl z-50 overflow-y-auto">
    <div class="p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-semibold">Edit Entry</h2>
        <button onclick="closePanel()" type="button" class="text-slate-400 hover:text-slate-600 text-3xl font-bold w-8 h-8 flex items-center justify-center rounded hover:bg-slate-100">&times;</button>
      </div>

      <form id="edit-form" class="space-y-4">
        <input type="hidden" id="entry-id">
        
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Description (read-only)</label>
          <input type="text" id="entry-description" readonly
            class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-slate-100 text-slate-600 cursor-not-allowed">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" id="entry-email" 
            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Sources (read-only)</label>
          <div id="entry-sources" class="flex flex-wrap gap-2"></div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">SLA</label>
          <div id="entry-sla" class="space-y-2"></div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Notifications</label>
          <div id="entry-notifications" class="space-y-2"></div>
          <button onclick="addNotification()" type="button" class="mt-2 text-sm text-indigo-600 hover:text-indigo-800">+ Add Notification</button>
        </div>

        <div class="space-y-2">
          <label class="flex items-center gap-2">
            <input type="checkbox" id="entry-monitor_endpoints" class="w-4 h-4 text-indigo-600 rounded">
            <span class="text-sm">Monitor Endpoints</span>
          </label>
          <label class="flex items-center gap-2">
            <input type="checkbox" id="entry-monitor_connectivity" class="w-4 h-4 text-indigo-600 rounded">
            <span class="text-sm">Monitor Connectivity</span>
          </label>
          <label class="flex items-center gap-2">
            <input type="checkbox" id="entry-monitor_backup" class="w-4 h-4 text-indigo-600 rounded">
            <span class="text-sm">Monitor Backup</span>
          </label>
          <label class="flex items-center gap-2">
            <input type="checkbox" id="entry-monitor_dtc" class="w-4 h-4 text-indigo-600 rounded">
            <span class="text-sm">Monitor DTC</span>
          </label>
          <label class="flex items-center gap-2">
            <input type="checkbox" id="entry-create_ticket" class="w-4 h-4 text-indigo-600 rounded">
            <span class="text-sm">Create Ticket</span>
          </label>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-4 right-4 bg-emerald-600 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300">
    Saved successfully!
  </div>

  <script>
    const ALL_SOURCES = ['CloudAlly', 'Huntress', 'Integra365', 'NinjaOne', 'Skykick', 'Sophos', 'Veeam', 'Zabbix'];
    let entries = [];
    let selectedSources = [];

    const sourceColors = {
      CloudAlly: 'bg-blue-100 text-blue-800',
      Huntress: 'bg-green-100 text-green-800',
      Integra365: 'bg-purple-100 text-purple-800',
      NinjaOne: 'bg-orange-100 text-orange-800',
      Skykick: 'bg-cyan-100 text-cyan-800',
      Sophos: 'bg-red-100 text-red-800',
      Veeam: 'bg-emerald-100 text-emerald-800',
      Zabbix: 'bg-yellow-100 text-yellow-800'
    };

    async function loadEntries() {
      const q = document.getElementById('search').value;
      const res = await fetch(`/api/entries?q=${encodeURIComponent(q)}`);
      entries = await res.json();
      renderSourceFilters();
      applyFilters();
    }

    function renderTable() {
      const tbody = document.getElementById('entries-body');
      tbody.innerHTML = entries.map(e => `
        <tr class="hover:bg-slate-50 cursor-pointer" onclick="openPanel('${e.id}')">
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">${e.description}</td>
          <td class="px-6 py-4">
            <div class="flex flex-wrap gap-1">
              ${e.source.map(s => `<span class="px-2 py-1 rounded-full text-xs font-medium ${sourceColors[s] || 'bg-gray-100'}">${s}</span>`).join('')}
            </div>
          </td>
        </tr>
      `).join('');
    }

    function filterEntries() {
      loadEntries();
    }

    function renderSourceFilters() {
      const container = document.getElementById('source-filters');
      const allSources = [...new Set(entries.flatMap(e => e.source || []))].sort();

      container.innerHTML = allSources.map(src => {
        const active = selectedSources.includes(src);
        return `<button
          class="px-2 py-1 rounded-full text-xs font-medium border ${active ? 'bg-indigo-600 text-white' : 'bg-white text-slate-700'}"
          onclick="toggleSource('${src}')"
        >${src}</button>`;
      }).join('');
    }

    function toggleSource(src) {
      if (selectedSources.includes(src)) {
        selectedSources = selectedSources.filter(s => s !== src);
      } else {
        selectedSources.push(src);
      }
      applyFilters();
      renderSourceFilters();
    }

    function applyFilters() {
      const filtered = entries.filter(e => {
        if (selectedSources.length === 0) return true;
        return selectedSources.every(s => (e.source || []).includes(s));
      });

      const tbody = document.getElementById('entries-body');
      tbody.innerHTML = filtered.map(e => `
        <tr class="hover:bg-slate-50 cursor-pointer" onclick="openPanel('${e.id}')">
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">${e.description}</td>
          <td class="px-6 py-4">
            <div class="flex flex-wrap gap-1">
              ${(e.source || []).map(s => `<span class="px-2 py-1 rounded-full text-xs font-medium ${sourceColors[s] || 'bg-gray-100'}">${s}</span>`).join('')}
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function openPanel(id) {
      const entry = entries.find(e => e.id === id);
      if (!entry) return;

      document.getElementById('entry-id').value = entry.id;
      document.getElementById('entry-description').value = entry.description;
      document.getElementById('entry-email').value = entry.email || '';
      document.getElementById('entry-monitor_endpoints').checked = entry.monitor_endpoints;
      document.getElementById('entry-monitor_connectivity').checked = entry.monitor_connectivity;
      document.getElementById('entry-monitor_backup').checked = entry.monitor_backup;
      document.getElementById('entry-monitor_dtc').checked = entry.monitor_dtc;
      document.getElementById('entry-create_ticket').checked = entry.create_ticket;

      // Sources
      const sourcesDiv = document.getElementById('entry-sources');
      sourcesDiv.innerHTML = entry.source.map(s => 
        `<span class="px-2 py-1 rounded-full text-xs font-medium ${sourceColors[s] || 'bg-gray-100'}">${s}</span>`
      ).join('');

      // SLA checkboxes
      const slaDiv = document.getElementById('entry-sla');
      const entrySla = entry.sla || [];
      slaDiv.innerHTML = entry.source.map(source => {
        const slaItem = `${source}-SLA`;
        const checked = entrySla.includes(slaItem);
        return `
          <label class="flex items-center gap-2">
            <input type="checkbox" class="sla-checkbox w-4 h-4 text-indigo-600 rounded" 
              data-source="${source}" ${checked ? 'checked' : ''}>
            <span class="text-sm">${source} SLA</span>
          </label>
        `;
      }).join('');

      // Notifications
      renderNotifications(entry.notifications || []);

      document.getElementById('edit-panel').classList.add('active');
    }

    let currentNotifications = [];

    function renderNotifications(notifications) {
      currentNotifications = notifications;
      const notifDiv = document.getElementById('entry-notifications');
      
      if (notifications.length === 0) {
        notifDiv.innerHTML = '<p class="text-sm text-slate-400">No notifications</p>';
        return;
      }

      notifDiv.innerHTML = notifications.map((n, idx) => `
        <div class="flex items-center gap-2 bg-slate-50 p-2 rounded">
          <input type="text" value="${n.task || ''}" placeholder="Task name" 
            class="notif-task text-sm px-2 py-1 border border-slate-300 rounded w-32" data-idx="${idx}">
          <select class="notif-interval text-sm px-2 py-1 border border-slate-300 rounded" data-idx="${idx}">
            <option value="O" ${n.interval === 'O' ? 'selected' : ''}>Once</option>
            <option value="W" ${n.interval === 'W' ? 'selected' : ''}>Weekly</option>
            <option value="M" ${n.interval === 'M' ? 'selected' : ''}>Monthly</option>
            <option value="B" ${n.interval === 'B' ? 'selected' : ''}>Bi-Monthly</option>
            <option value="Q" ${n.interval === 'Q' ? 'selected' : ''}>Quarterly</option>
            <option value="H" ${n.interval === 'H' ? 'selected' : ''}>Half-Yearly</option>
            <option value="Y" ${n.interval === 'Y' ? 'selected' : ''}>Yearly</option>
            <option value="T" ${n.interval === 'T' ? 'selected' : ''}>Two-Yearly</option>
          </select>
          <input type="date" value="${n.triggered || ''}" 
            class="notif-triggered text-sm px-2 py-1 border border-slate-300 rounded" data-idx="${idx}">
          <button onclick="removeNotification(${idx})" type="button" class="text-red-500 hover:text-red-700 text-lg">&times;</button>
        </div>
      `).join('');
    }

    function addNotification() {
      currentNotifications.push({ task: '', interval: 'M', triggered: '' });
      renderNotifications(currentNotifications);
    }

    function removeNotification(idx) {
      currentNotifications.splice(idx, 1);
      renderNotifications(currentNotifications);
    }

    function closePanel() {
      document.getElementById('edit-panel').classList.remove('active');
    }

    async function saveAll() {
      const id = document.getElementById('entry-id').value;
      if (!id) {
        showToast('No entry selected', 'error');
        return;
      }

      const entry = entries.find(e => e.id === id);
      const sources = entry.source;

      // Build SLA array based on checkboxes
      const sla = [];
      sources.forEach(source => {
        const checkbox = document.querySelector(`.sla-checkbox[data-source="${source}"]`);
        if (checkbox && checkbox.checked) {
          sla.push(`${source}-SLA`);
        }
      });

      const data = {
        email: document.getElementById('entry-email').value,
        sla: sla,
        notifications: currentNotifications.map((n, idx) => ({
          task: document.querySelector(`.notif-task[data-idx="${idx}"]`)?.value || n.task,
          interval: document.querySelector(`.notif-interval[data-idx="${idx}"]`)?.value || n.interval,
          triggered: document.querySelector(`.notif-triggered[data-idx="${idx}"]`)?.value || n.triggered
        })),
        monitor_endpoints: document.getElementById('entry-monitor_endpoints').checked,
        monitor_connectivity: document.getElementById('entry-monitor_connectivity').checked,
        monitor_backup: document.getElementById('entry-monitor_backup').checked,
        monitor_dtc: document.getElementById('entry-monitor_dtc').checked,
        create_ticket: document.getElementById('entry-create_ticket').checked
      };

      try {
        await fetch(`/api/entries/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        await fetch('/api/save', { method: 'POST' });
        
        showToast('Saved successfully!');
        loadEntries();
        closePanel();
      } catch (err) {
        showToast('Error saving: ' + err.message, 'error');
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `fixed bottom-4 right-4 ${type === 'error' ? 'bg-red-600' : 'bg-emerald-600'} text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-0 opacity-100 transition-all duration-300`;
      
      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 2000);
    }

    // Initial load
    loadEntries();
  </script>
</body>
</html>
